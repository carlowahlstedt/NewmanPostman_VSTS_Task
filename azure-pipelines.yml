resources:
- repo: self
  clean: true

stages:
- stage: Build
  displayName: Build and Test
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Npm@1
      displayName: 'npm install'
      inputs:
        verbose: false

    - task: Npm@1
      displayName: 'npm install-task-lib'
      inputs:
        command: custom
        verbose: false
        customCommand: 'run install-task-lib'

    - task: Npm@1
      displayName: 'npm test'
      inputs:
        command: custom
        verbose: false
        customCommand: 'run test'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/TEST-*.xml'

    - task: Npm@1
      displayName: 'npm compile'
      inputs:
        command: custom
        verbose: false
        customCommand: 'run compile'

    - task: TfxInstaller@5
      inputs:
        version: 'v0.17.x'

    - task: ms-devlabs.vsts-developer-tools-build-tasks.package-extension-build-task.PackageVSTSExtension@5
      displayName: 'Package Extension'
      inputs:
        outputPath: '$(Build.ArtifactStagingDirectory)/output.vsix'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact: drop'
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/master')
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/output.vsix'
        ArtifactName: drop

- stage: Publish
  displayName: Publish to Marketplace
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  jobs:
  - deployment: PublishMarketplace
    displayName: Publish .vsix and tag GitHub release
    pool:
      vmImage: 'ubuntu-latest'
    environment: marketplace
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: ms-devlabs.vsts-developer-tools-build-tasks.tfx-installer-build-task.TfxInstaller@5
            displayName: 'Use Node CLI for Azure DevOps (tfx-cli): v0.17.x'
            inputs:
              version: 'v0.17.x'

          - task: ms-devlabs.vsts-developer-tools-build-tasks.extension-version-build-task.ExtensionVersion@5
            displayName: 'Query Extension Version: carlowahlstedt.NewmanPostman'
            inputs:
              connectTo: 'VsTeam'
              connectedServiceName: 'carlowahlstedt-VSTS'
              publisherId: carlowahlstedt
              extensionId: NewmanPostman
              versionAction: Patch

          - task: ms-devlabs.vsts-developer-tools-build-tasks.publish-extension-build-task.PublishExtension@5
            displayName: 'Publish Extension'
            inputs:
              connectTo: 'VsTeam'
              connectedServiceName: 'carlowahlstedt-VSTS'
              fileType: vsix
              vsixFile: '$(Pipeline.Workspace)/drop/output.vsix'
              extensionVersion: '$(Extension.Version)'

          - task: GitHubRelease@1
            displayName: 'Create GitHub Release'
            inputs:
              gitHubConnection: 'GitHub connection 1'
              repositoryName: 'carlowahlstedt/NewmanPostman_VSTS_Task'
              action: Create
              tagSource: userSpecifiedTag
              tag: 'v$(Extension.Version)'
              releaseNotesSource: filePath
              releaseNotesFilePath: CHANGELOG.md
              assets: |
                $(Pipeline.Workspace)/drop/*
